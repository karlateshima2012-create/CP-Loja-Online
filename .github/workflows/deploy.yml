name: Deploy to Hostinger (Password)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm install

      - name: Create Production .env
        working-directory: ./frontend
        run: |
          echo "VITE_API_BASE_URL=https://cp-loja-online.creativeprintjp.com/api" > .env.production

      - name: Build Frontend
        working-directory: ./frontend
        run: |
          npm run build
          ls -la dist/ # Verificar se a pasta dist foi criada

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, sqlite3, curl

      - name: Install Backend Dependencies
        working-directory: ./backend
        run: composer install --no-dev --optimize-autoloader

      - name: Prepare Deployment Files
        run: |
          echo "Gerando pacote de deploy..."
          mkdir -p deploy_package
          
          if [ -d "frontend/dist" ]; then
            cp -r frontend/dist/* deploy_package/
          else
            echo "ERRO: Pasta frontend/dist não encontrada!"
            exit 1
          fi
          
          if [ -d "backend" ]; then
            cp -r backend deploy_package/
          else
            echo "ERRO: Pasta backend não encontrada!"
            exit 1
          fi
          
          cp .htaccess deploy_package/
          
          # Remover banco local e cache
          rm -f deploy_package/backend/database/database.sqlite
          rm -f deploy_package/backend/.env
          
          # Criar o .env de produção do Backend
          echo "APP_KEY=${{ secrets.APP_KEY }}" > deploy_package/backend/.env
          echo "DB_HOST=${{ secrets.DB_HOST || '127.0.0.1' }}" >> deploy_package/backend/.env
          echo "DB_DATABASE=${{ secrets.DB_DATABASE }}" >> deploy_package/backend/.env
          echo "DB_USERNAME=${{ secrets.DB_USERNAME }}" >> deploy_package/backend/.env
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> deploy_package/backend/.env
          
          echo "Conteúdo do pacote de deploy:"
          ls -R deploy_package | head -n 20

      - name: Cleanup and Diagnostic via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            echo "--- INÍCIO LIMPEZA ---"
            TARGET_DIR="/home/u176367625/domains/creativeprintjp.com/public_html/cp-loja-online"
            
            if [ -d "$TARGET_DIR" ]; then
              cd "$TARGET_DIR"
              echo "Limpando arquivos antigos em $(pwd)..."
              # Limpar tudo exceto a pasta backend
              find . -maxdepth 1 ! -name 'backend' ! -name '.' ! -name '..' -exec rm -rf {} +
            else
              echo "Pasta não encontrada, criando: $TARGET_DIR"
              mkdir -p "$TARGET_DIR"
            fi
            echo "--- FIM LIMPEZA ---"

      - name: Deploy to Hostinger via SCP (Password)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          source: "deploy_package/*"
          target: "/home/u176367625/domains/creativeprintjp.com/public_html/cp-loja-online/"
          strip_components: 1
          overwrite: true

      - name: Backend Setup via SSH (Password)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            cd /home/u176367625/domains/creativeprintjp.com/public_html/cp-loja-online/backend
            echo "Rodando migrações em $(pwd)..."
            php artisan migrate --force

      - name: Backend Setup via SSH (Password)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            cd public_html/cp-loja-online/backend
            echo "Rodando migrações em $(pwd)..."
            php artisan migrate --force

